<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>0312 flex</title>
    <style>
        .wrap{
            background-color: gainsboro;
            width: 500px;
            height: 500px;
            display: flex;
            justify-content: space-between;
        }
        .wrap>div>div{
            color:white;
            line-height: 100px;
            text-align: center;
            font-size: 40px;
            width: 100px;
            height:100px
        }
        .wrap>div{            
            display: flex;
            justify-content: space-between; 
        }
        .left-side{
            display:flex;
            flex-direction: column;
            
        }
        .center{
            display: flex;
            flex-direction: column;                       
        } 
        .right-side{
            display:flex;
            flex-direction: column;                       
        }

        .blue{
            background-color: #4967d8;
        }
        .pink{
            background-color: #ea8676;
        }
        .yellow{
            background-color: #fad84a
        }


    </style>
</head>
<body>
    <div class="wrap">
        <div class="left-side">
            <div class="blue">A</div>
            <div class="pink">B</div>
            <div class="yellow">C</div>
        </div>
        <div class="center">
            <div class="blue">D</div>            
            <div class="yellow">E</div>
        </div>
        <div class="right-side">
            <div class="blue">F</div>
            <div class="pink">G</div>
            <div class="yellow">H</div>
        </div>        
    </div>
    
</body>
</html>
