<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>0312 flex</title>
    <style>
        .wrap{
            background-color: gainsboro;
            width: 700px;
            height: 500px;;
            display: flex;
            /*gap: 10px;
            flex-direction: row-reverse;*/
            justify-content: flex-end;
            
            
        }
        .wrap>div>div{
            color:white;
            line-height: 100px;
            text-align: center;
            font-size: 40px;
            width: 100px;
            height:100px
        }
        .wrap>div{
            display: flex;
            /* justify-content: center;
            align-items: center ; */
        }
        .center>div{
            display: flex;
            
        } 
        .right-side>div{
            display:flex;
            
        }

        .blue{
            background-color: #4967d8;
        }
        .pink{
            background-color: #ea8676;
        }
        .yellow{
            background-color: #fad84a
        }


    </style>
</head>
<body>
    <div class="wrap">
        <div class="left-side">
            <div class="blue">A</div>            
        </div>        
    </div>
    
</body>
</html>
